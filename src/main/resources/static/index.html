<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Management System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">Student Management System</h2>

    <!-- FORM -->
    <div class="card p-3 mb-4">
        <h5>Add / Update Student</h5>

        <input type="hidden" id="studentId">

        <div class="mb-2">
            <input type="text" id="name" class="form-control" placeholder="Student Name">
        </div>

        <div class="mb-2">
            <input type="email" id="email" class="form-control" placeholder="Email">
        </div>

        <div class="mb-2">
            <input type="text" id="course" class="form-control" placeholder="Course">
        </div>

        <button class="btn btn-primary" onclick="saveStudent()">Save Student</button>
    </div>

    <!-- TABLE -->
    <div class="card p-3">
        <h5>Student List</h5>

        <table class="table table-bordered">
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Course</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody id="studentTable"></tbody>
        </table>
    </div>

</div>

<script>
const apiUrl = "/students";

/* LOAD STUDENTS */
function loadStudents() {
    fetch(apiUrl)
        .then(res => res.json())
        .then(data => {
            let rows = "";

            data.forEach(s => {
                rows += `
                    <tr>
                        <td>${s.id}</td>
                        <td>${s.name}</td>
                        <td>${s.email}</td>
                        <td>${s.course}</td>
                        <td>
                            <button class="btn btn-warning btn-sm"
                                onclick="editStudent(${s.id}, '${s.name}', '${s.email}', '${s.course}')">
                                Edit
                            </button>

                            <button class="btn btn-danger btn-sm"
                                onclick="deleteStudent(${s.id})">
                                Delete
                            </button>
                        </td>
                    </tr>
                `;
            });

            document.getElementById("studentTable").innerHTML = rows;
        });
}

/* SAVE / UPDATE STUDENT */
function saveStudent() {

    const id = document.getElementById("studentId").value;

    const student = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        course: document.getElementById("course").value
    };

    if (id) {
        fetch(`${apiUrl}/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(student)
        }).then(() => {
            loadStudents();
            clearForm();
        });

    } else {
        fetch(apiUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(student)
        }).then(() => {
            loadStudents();
            clearForm();
        });
    }
}

/* EDIT STUDENT */
function editStudent(id, name, email, course) {
    document.getElementById("studentId").value = id;
    document.getElementById("name").value = name;
    document.getElementById("email").value = email;
    document.getElementById("course").value = course;
}

/* DELETE STUDENT */
function deleteStudent(id) {
    fetch(`${apiUrl}/${id}`, {
        method: "DELETE"
    }).then(() => loadStudents());
}

/* CLEAR FORM */
function clearForm() {
    document.getElementById("studentId").value = "";
    document.getElementById("name").value = "";
    document.getElementById("email").value = "";
    document.getElementById("course").value = "";
}

/* INITIAL LOAD */
loadStudents();
</script>

</body>
</html>
